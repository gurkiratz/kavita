<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kavita · Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="wrap">
      <h1 id="heading">ਕਵਿਤਾ · Add a poem</h1>
      <p class="sub" id="subheading">
        Saves directly to your collection. Line breaks and spacing are kept
        exactly.
      </p>

      <label
        >Password <span class="hint">(remembered on this device)</span></label
      >
      <input id="token" type="password" autocomplete="current-password" />

      <form id="poemForm">
        <input type="hidden" id="editId" name="editId" value="" />

        <div class="row">
          <div>
            <label
              >Title — Gurmukhi
              <span clasmans="hint">(Gurbani Akhar typing)</span></label
            >
            <input
              name="titleGurmukhi"
              class="gurmukhi-input"
              lang="pa"
              autocomplete="off"
            />
          </div>
          <div>
            <label>Title — English</label>
            <input name="titleRoman" />
          </div>
        </div>

        <label
          >Punjabi (Gurmukhi)
          <span class="hint"
            >Gurbani Akhar typing — line breaks kept</span
          ></label
        >
        <textarea
          name="gurmukhi"
          class="gurmukhi-input"
          lang="pa"
          autocomplete="off"
        ></textarea>

        <label
          >English <span class="hint">paste with real line breaks</span></label
        >
        <textarea name="roman"></textarea>

        <div class="row">
          <div>
            <label>Poet <span class="hint">(optional)</span></label>
            <input name="poet" />
          </div>
          <div>
            <label>Tags <span class="hint">(comma separated)</span></label>
            <input name="tags" />
          </div>
        </div>

        <label
          >Images
          <span class="hint" id="imagesHint"
            >(optional — reorder, remove, or add)</span
          ></label
        >
        <div id="imageEditor" class="image-editor"></div>
        <input
          id="newImages"
          name="images"
          type="file"
          accept="image/*"
          multiple
        />

        <div class="actions">
          <button id="submit" type="submit">Save poem</button>
          <button id="cancelEdit" type="button" class="secondary hidden">
            Cancel edit
          </button>
          <button
            id="deletePoem"
            type="button"
            class="icon-btn danger hidden"
            title="Delete poem"
            aria-label="Delete poem"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              <line x1="10" y1="11" x2="10" y2="17"></line>
              <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
          </button>
        </div>
      </form>

      <div id="status" class="status"></div>

      <h2>In your collection</h2>
      <p class="sub" id="count"></p>
      <input
        id="search"
        type="search"
        placeholder="Search poems…"
        autocomplete="off"
        class="search hidden"
      />
      <div id="list"></div>
    </div>

    <div id="lightbox" class="lightbox hidden" aria-hidden="true">
      <button
        type="button"
        id="lbClose"
        class="lb-btn lb-close"
        aria-label="Close"
      >
        ✕
      </button>
      <button
        type="button"
        id="lbPrev"
        class="lb-btn lb-prev"
        aria-label="Previous image"
      >
        ‹
      </button>
      <img id="lbImg" class="lb-img" alt="" />
      <button
        type="button"
        id="lbNext"
        class="lb-btn lb-next"
        aria-label="Next image"
      >
        ›
      </button>
      <div id="lbCounter" class="lb-counter"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gurmukhi-utils@3/dist/index.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
